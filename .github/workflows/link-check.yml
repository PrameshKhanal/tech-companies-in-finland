name: Check Links

on:
  # Run on the 1st of every month at 09:00 UTC (11:00 Helsinki time)
  schedule:
    - cron: "0 9 1 * *"

  # Allow manual trigger from the Actions tab
  workflow_dispatch:

jobs:
  linkcheck:
    runs-on: ubuntu-latest
    permissions:
      issues: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check links with Lychee
        id: lychee
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --verbose
            --no-progress
            --accept 200,204,301,302,403,429
            --timeout 30
            --max-retries 3
            --max-concurrency 5
            --exclude 'linkedin\.com'
            --exclude 'glassdoor\.com'
            --format markdown
            './README.md'
          output: ./lychee/out.md
          fail: false

      - name: Check output file
        id: check_output
        run: |
          if [ -f ./lychee/out.md ] && [ -s ./lychee/out.md ]; then
            echo "has_content=true" >> $GITHUB_OUTPUT
            echo "--- Lychee output ---"
            cat ./lychee/out.md
          else
            echo "has_content=false" >> $GITHUB_OUTPUT
            echo "No broken links found or output file is empty."
          fi

      - name: Create issue if broken links found
        if: steps.lychee.outputs.exit_code != 0 && steps.check_output.outputs.has_content == 'true'
        uses: peter-evans/create-issue-from-file@v5
        with:
          title: "🔗 Broken links detected (monthly check)"
          content-filepath: ./lychee/out.md
          labels: |
            broken-link
            automated
